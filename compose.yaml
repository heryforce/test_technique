services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: test_technique
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  apache:
    image: php:8.5-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/
    depends_on:
      - database
    environment:
      DATABASE_URL: "postgresql://root:root@127.0.0.1:5432/test_technique?serverVersion=16&charset=utf8"

volumes:
  db_data: